<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Odyssey</title>
    <link rel="icon" type="image/x-icon" href="img/odyssey.png">
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        code {
            background-color: #f4f4f4;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }
        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            border: 1px solid #ddd;
        }
        h2 {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        h3 {
            color: #444;
        }
        a, a:visited {
            text-decoration: none;  /* Removes the underline */
            color: blue;           /* Sets a consistent color for both states */
        }
    </style>
</head>
<body>
	<h1>Odyssey</h1>

</body>
</html>
